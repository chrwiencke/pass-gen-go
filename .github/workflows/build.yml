name: Test, Build, and Release GoPass

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gopass-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_FILE: go.mod

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./internal/...

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    needs: test
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: amd64
            runner: macos-15-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build GoPass.app
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x scripts/build-macos.sh
          ./scripts/build-macos.sh

      - name: Zip GoPass.app for normal downloads
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/macos-${{ matrix.arch }}/GoPass.app" \
            "dist/GoPass-macos-${{ matrix.arch }}.zip"

      - name: Create raw updater asset
        run: |
          RAW_ASSET="dist/gopass_darwin_${{ matrix.arch }}"
          cp "dist/macos-${{ matrix.arch }}/GoPass.app/Contents/MacOS/GoPass" "$RAW_ASSET"
          chmod +x "$RAW_ASSET"
          shasum -a 256 "$RAW_ASSET" > "$RAW_ASSET.sha256"
          ls -lh "$RAW_ASSET" "$RAW_ASSET.sha256"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: GoPass-macos-${{ matrix.arch }}
          path: |
            dist/GoPass-macos-${{ matrix.arch }}.zip
            dist/gopass_darwin_${{ matrix.arch }}
            dist/gopass_darwin_${{ matrix.arch }}.sha256
          if-no-files-found: error

  build-windows:
    name: Build Windows amd64
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Resolve build version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME.StartsWith("v")) {
            "version=$($env:GITHUB_REF_NAME.Substring(1))" >> $env:GITHUB_OUTPUT
          } else {
            "version=0.0.0-dev" >> $env:GITHUB_OUTPUT
          }

      - name: Build gopass.exe
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/build-windows.ps1

      - name: Zip gopass.exe for normal downloads
        shell: pwsh
        run: Compress-Archive -Path dist/windows-amd64/gopass.exe -DestinationPath dist/GoPass-windows-amd64.zip -Force

      - name: Create raw updater asset
        shell: pwsh
        run: |
          Copy-Item dist/windows-amd64/gopass.exe dist/gopass_windows_amd64.exe -Force

          $hash = Get-FileHash -Algorithm SHA256 dist/gopass_windows_amd64.exe
          "$($hash.Hash.ToLower())  gopass_windows_amd64.exe" | Set-Content -NoNewline dist/gopass_windows_amd64.exe.sha256

          Get-ChildItem dist/gopass_windows_amd64.exe, dist/gopass_windows_amd64.exe.sha256

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: GoPass-windows-amd64
          path: |
            dist/GoPass-windows-amd64.zip
            dist/gopass_windows_amd64.exe
            dist/gopass_windows_amd64.exe.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: GoPass-*
          merge-multiple: true
          path: release-assets

      - name: Show release assets
        run: ls -lh release-assets

      - name: Create or update release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --title "GoPass ${GITHUB_REF_NAME}" \
              --notes "Automated GoPass release for ${GITHUB_REF_NAME}."
          fi